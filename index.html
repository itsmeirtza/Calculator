<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculate with Irtza</title>

<style>
body {
    background: #0a0a0a;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    flex-direction: column;
    margin:0;
    padding:10px;
}

.wrapper{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.calculator {
    background: #111;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 30px #00f7ff;
    width: 320px;
    max-width: 100%;
}

.preview {
    width:220px;
    background:#111;
    padding:15px;
    border-radius:20px;
    box-shadow:0 0 20px #ff00ff;
    color:white;
}

.preview h3{
    color:#ff00ff;
    margin-bottom:10px;
}

.preview-box{
    background:#000;
    padding:10px;
    border-radius:10px;
    min-height:50px;
    color:#00f7ff;
    box-shadow: inset 0 0 10px #00f7ff;
}

.history-list{
    margin-top:10px;
    font-size:12px;
    max-height:200px;
    overflow:auto;
}

h1 {
    color: #00f7ff;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 0 10px #00f7ff;
}

#history {
    color: #888;
    font-size: 14px;
    min-height: 20px;
    text-align: right;
    margin-bottom: 5px;
}

#display {
    width: 100%;
    height: 60px;
    font-size: 22px;
    border: none;
    outline: none;
    text-align: right;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 10px;
    background: #000;
    color: #00f7ff;
    box-shadow: inset 0 0 10px #00f7ff;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 55px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    color: white;
    background: #111;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 5px #00f7ff, 0 0 10px #00f7ff;
}

button:hover {
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

.equal {
    background: #00f7ff;
    color: black;
}

.clear {
    background: red;
}

.extra {
    background: #222;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.copy{
    background:#ff00ff;
    color:white;
    padding:5px 10px;
    border-radius:10px;
    cursor:pointer;
    font-size:12px;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
    .wrapper{
        flex-direction: column;
        align-items: center;
    }

    .preview{
        width: 100%;
    }

    .calculator{
        width: 100%;
    }

    button{
        height: 50px;
        font-size: 14px;
    }

    #display{
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="calculator">
    <h1>Calculate with Irtza</h1>
    <div id="history"></div>
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')">/</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')">*</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')">-</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')">+</button>

        <button onclick="append('0')" class="extra">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="append('(')" >(</button>
        <button onclick="append(')')">)</button>

        <button onclick="calculate()" class="equal" style="grid-column: span 4;">=</button>
    </div>
</div>

<div class="preview">
    <h3>Live Preview</h3>
    <div class="preview-box" id="previewBox">0</div>
    <div class="topbar">
        <span>History</span>
        <span class="copy" onclick="copyResult()">Copy</span>
    </div>
    <div class="history-list" id="historyList"></div>
</div>

</div>

<script>
let display = document.getElementById("display");
let history = document.getElementById("history");
let previewBox = document.getElementById("previewBox");
let historyList = document.getElementById("historyList");

function append(value) {
    display.value += value;
    livePreview();
}

function clearDisplay() {
    display.value = "";
    previewBox.innerText = "0";
}

function backspace() {
    display.value = display.value.slice(0, -1);
    livePreview();
}

function livePreview(){
    try{
        previewBox.innerText = display.value ? eval(display.value) : 0;
    }catch{
        previewBox.innerText = "Error";
    }
}

function calculate() {
    try {
        let result = eval(display.value);
        history.innerText = display.value + " =";
        display.value = result;

        let item = document.createElement("div");
        item.innerText = history.innerText + " " + result;
        historyList.prepend(item);

        previewBox.innerText = result;
    } catch {
        display.value = "Error";
    }
}

function copyResult(){
    navigator.clipboard.writeText(display.value);
    alert("Copied: " + display.value);
}
</script>

</body>
</html>
